<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>La Jama</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"/>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Mooli&display=swap" rel="stylesheet"/>

    <link th:href="@{/css/login.css}" rel="stylesheet" />

</head>
<body>

    <div class="d-flex justify-content-center login-container vh-100 vw-100">
        <div class="border border-4 login-page my-5 overflow-hidden rounded-5 w-75">
<!--            <div class="left-side"></div>-->

            <div class="center">
                <div class="login-form-container">
                    <h1 class="login-title">Bienvenido</h1>
                    <p class="login-subtitle">Inicia sesión para continuar</p>

                    <form
                            id="loginForm"
                            th:action="@{/login}"
                            method="post"
                            class="mt-4"
                    >
                        <div class="form-group-icon mb-3">
                            <i class="bi bi-person-fill input-icon"></i>
                            <input
                                    type="text"
                                    class="form-control"
                                    id="usuario"
                                    name="usuario"
                                    placeholder="Usuario"
                                    required
                                    autofocus
                            />
                        </div>

                        <div class="form-group-icon mb-4">
                            <i class="bi bi-lock-fill input-icon"></i>
                            <input
                                    type="password"
                                    class="form-control"
                                    id="clave"
                                    name="clave"
                                    placeholder="Contraseña"
                                    required
                            />
                            <span class="password-toggle" id="togglePassword">
                                <i class="bi bi-eye"></i>
                            </span>
                        </div>

                        <div class="d-grid">
                            <button class="btn btn-login" type="submit">
                                Ingresar <i class="bi bi-arrow-right-short"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script th:inline="javascript">
        const errorMessage = /*[[${error}]]*/ null;
        const logoutMessage = /*[[${logout}]]*/ null;
    </script>
    <script th:src="@{/js/login.js}"></script>
    <script>
        const inputPassword = document.querySelector("#clave");
        document.querySelector("#togglePassword")
            .addEventListener("click", function () {
                const type =
                    inputPassword.getAttribute("type") === "password"
                        ? "text"
                        : "password";
                inputPassword.setAttribute("type", type);
                this.querySelector("i").classList.toggle("bi-eye");
                this.querySelector("i").classList.toggle("bi-eye-slash");
        });
    </script>
</body>
</html>
