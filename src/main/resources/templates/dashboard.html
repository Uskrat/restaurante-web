<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Principal</title>

    <th:block th:replace="~{links :: headLinks}"></th:block>

    <link th:href="@{/css/dashboard.css}" rel="stylesheet" />
</head>
<body>
    <div class="d-flex">
        <div th:replace="~{sidebar :: sidebar(activeUri='/')}"></div>

        <main id="main-content" class="main-content w-100">
            <header class="header-size m-2 ms-3 me-0 mt-3 p-3">
                <div
                        class="d-flex align-items-center justify-content-between"
                >
                    <div class="d-flex align-items-center gap-3">
                        <button id="open-sidebar" class="btn btn-light d-md-none">
                            <i class="bi bi-list fs-4"></i>
                        </button>
                        <h4 class="mb-0 fw-bold">Resumen General</h4>
                    </div>
                </div>
            </header>

            <div class="container-fluid px-4">

                <div class="row g-3 mb-4">

                    <div class="col-12 col-sm-6">
                        <div class="card card-dashboard card-kpi shadow-sm h-100 bg-gradient-primary">
                            <div
                                    class="card-body d-flex align-items-center justify-content-between"
                            >
                                <div>
                                    <h6
                                            class="text-muted text-uppercase fw-bold mb-1"
                                            style="font-size: 0.8rem"
                                    >
                                        Cantidad de usuarios
                                    </h6>
                                    <h3 class="mb-0 fw-bold text-dark" id="kpiCantidadUsuarios">
                                        <span th:text="${totalUsuarios}"></span>
                                    </h3>
                                </div>
                                <div class="icon-box bg-gradient-primary shadow">
                                    <i class="bi bi-person-fill"></i>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-12 col-sm-6">
                        <div class="card card-dashboard card-kpi shadow-sm h-100 bg-gradient-success">
                            <div
                                    class="card-body d-flex align-items-center justify-content-between"
                            >
                                <div>
                                    <h6
                                            class="text-muted text-uppercase fw-bold mb-1"
                                            style="font-size: 0.8rem"
                                    >
                                        Cantidad de platos vendidos hoy
                                    </h6>
                                    <h3 class="mb-0 fw-bold text-dark" id="kpiPlatosVendidosHoy">
                                        0
                                    </h3>
                                </div>
                                <div class="icon-box bg-gradient-success shadow">
                                    <i class="bi bi-cart-fill"></i>
                                </div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <th:block th:replace="~{links :: scriptLinks}"></th:block>

    <script th:src="@{/js/dashboard.js}"></script>
</body>
</html>
