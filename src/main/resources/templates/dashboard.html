<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Principal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>

    <link th:href="@{/css/main.css}" rel="stylesheet" />
    <link th:href="@{/css/sidebar.css}" rel="stylesheet" />
    <link th:href="@{/css/dashboard.css}" rel="stylesheet" />
</head>
<body>
    <div class="d-flex">
        <div th:replace="~{sidebar :: sidebar(activeUri='/')}"></div>

        <main id="main-content" class="main-content w-100">
            <header class="header-size m-2 ms-3 me-0 mt-3 p-3">
                <div
                        class="d-flex align-items-center justify-content-between text-white"
                >
                    <div class="d-flex align-items-center gap-3">
                        <button id="open-sidebar" class="btn btn-light d-md-none">
                            <i class="bi bi-list fs-4"></i>
                        </button>
                        <h4 class="mb-0 fw-bold">Resumen General</h4>
                    </div>
                </div>
            </header>

            <div class="container-fluid px-4">
                <div>
                    <h1>Test</h1>
                </div>
            </div>
        </main>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script th:src="@{/js/utiles-comunes.js}"></script>
    <script th:src="@{/js/main.js}"></script>
    <script th:src="@{/js/dashboard.js}"></script>
</body>
</html>
